services:
  app:
    image: ${APP_IMAGE:-ghcr.io/sparktocomfy/app:latest}
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./config/backend:/workspace/config:ro
    ports:
      - "${APP_PORT:-8000}:8000"
    restart: unless-stopped
