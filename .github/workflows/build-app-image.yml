name: Build app image

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Image tag to publish"
        required: true
        default: "latest"
      backend_ref:
        description: "SparkToComfy-backend branch, tag, or commit"
        required: true
        default: "main"
      frontend_ref:
        description: "SparkToComfy-frontend branch, tag, or commit"
        required: true
        default: "main"
      mark_latest:
        description: "Also move :latest to this build (use for real releases)"
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - "Dockerfile.app"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/sparktocomfy/app
  BACKEND_REPO: https://github.com/SparkToComfy/SparkToComfy-backend.git
  FRONTEND_REPO: https://github.com/SparkToComfy/SparkToComfy-frontend.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve refs
        id: refs
        shell: bash
        run: |
          app_version="${{ github.event.inputs.app_version }}"
          backend_ref="${{ github.event.inputs.backend_ref }}"
          frontend_ref="${{ github.event.inputs.frontend_ref }}"

          # Empty app_version = the push trigger (no inputs); main builds publish
          # :edge so they never overwrite the release :latest.
          if [ -z "$app_version" ]; then app_version="edge"; fi
          if [ -z "$backend_ref" ]; then backend_ref="main"; fi
          if [ -z "$frontend_ref" ]; then frontend_ref="main"; fi

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "backend_ref=$backend_ref" >> "$GITHUB_OUTPUT"
          echo "frontend_ref=$frontend_ref" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate private source token
        shell: bash
        run: |
          if [ -z "${{ secrets.SPARKTOCOMFY_SOURCE_TOKEN }}" ]; then
            echo "::error title=Missing source token::SparkToComfy-backend and SparkToComfy-frontend are private. Add a fine-grained token with read access to both repos as SPARKTOCOMFY_SOURCE_TOKEN in this repo's Actions secrets, or make the source repos public."
            exit 1
          fi

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          tags="${IMAGE_NAME}:${APP_VERSION}"
          # MARK_LATEST is "true"/"false" on workflow_dispatch, empty on push.
          if [ "$MARK_LATEST" = "true" ] && [ "$APP_VERSION" != "latest" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
          fi
          {
            echo "tags<<EOF"
            printf '%s\n' "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          APP_VERSION: ${{ steps.refs.outputs.app_version }}
          MARK_LATEST: ${{ github.event.inputs.mark_latest }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.refs.outputs.app_version }}
            BACKEND_REPO=${{ env.BACKEND_REPO }}
            BACKEND_REF=${{ steps.refs.outputs.backend_ref }}
            FRONTEND_REPO=${{ env.FRONTEND_REPO }}
            FRONTEND_REF=${{ steps.refs.outputs.frontend_ref }}
            VITE_API_BASE=
          secrets: |
            github_token=${{ secrets.SPARKTOCOMFY_SOURCE_TOKEN }}
